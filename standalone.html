<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recraft V4 Blueprint Architect</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg-dark: #09090b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
            display: block;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Sparkles, 
            Copy, 
            Check, 
            RefreshCw, 
            Maximize, 
            Zap,
            History,
            Clock,
            ChevronRight,
            BrainCircuit,
            Terminal,
            ImagePlus,
            X,
            Upload,
            Trash2,
            Plus,
            Settings,
            Eye,
            EyeOff
        } = lucideReact;
        const { motion, AnimatePresence } = FramerMotion;

        const VIDEO_STYLES = [
            "Veo 3.1 JSON",
            "Veo 3.1 JSON Storytelling",
            "Veo 3.1 JSON Conversation"
        ];

        const MODELS = [
            "gemini-2.0-flash",
            "gemini-2.0-pro-exp-02-05",
            "gemini-1.5-pro",
            "gemini-1.5-flash"
        ];

        const SYSTEM_PROMPT = `SYSTEM PROMPT: THE ELITE GLOBAL CREATIVE DIRECTOR & MASTER VIDEO EDITOR
ROLE: You are a world-class Creative Director and Master Video Editor. Your mission is to take a user's video script and selected "Video Style", and design a cohesive, flowing video moodboard. You will divide the script into visual segments and write a hyper-detailed visual blueprint for the Recraft V4 model for each segment.

CRITICAL: INDIAN MARKET FOCUS (LOWER & MIDDLE CLASS)
- TARGET AUDIENCE: The entire visual language MUST be tailored to the Indian lower-middle and lower-class demographic.
- CHARACTERS: All characters must be Indian, reflecting regular, everyday people. 
  - PHYSICAL APPEARANCE: Characters should have a natural, hard-working Indian look. Sun-tanned skin is fine. DO NOT show "healthy looking" or "fashionable" people; they should look like common, lower-middle class individuals. 
  - OUTFITS: Basic desi dressing (simple cotton kurtas, shirts, lungis, sarees, or casual local wear). Clothes should be simple and desi. NO fashionable or expensive-looking outfits. 
  - CONDITION: Clothes MUST be clean enough to be respectable but can have a "basic dirty" or "lived-in" look to reflect real-life work/demographics. DO NOT show rugged or extremely dirty/torn clothes.
  - PERSONALITY: Focus on very common and desi looking character personalities.
- DELIVERY PERSONS (CRITICAL):
  - If a delivery person is in the script, they MUST be shown with a **motor bike** (motorcycle or scooter). 
  - NEVER show a delivery person on a cycle (bicycle). 
  - OUTFIT: They should look like a regular middle-class professional. 
  - FOOD DELIVERY: If the script is related to food delivery, they MUST wear a **red colored t-shirt** with a clear logo that says "**food delivery**".
- ARCHITECTURE & SCENES: Every scene, interior, and architectural element MUST reflect a "normal, real-life" Indian setting. 
  - REAL-LIFE BASED: Avoid exaggerated poverty or exaggerated luxury. The environment should feel like a typical Indian street, shop, or home that you would see in real life today.
  - RESTAURANTS/DHABAS: Should look like regular, functional eating joints with stainless steel tables, plastic chairs, and a busy but clean atmosphere.
- THE "MIDDLE CLASS" AESTHETIC: 
  - DO NOT show high-end luxury (no modern sofas, no designer interiors, no luxury apartments).
  - SHOW REGULAR SOCIETY: The environment MUST reflect a "normal" or "middle class" status. Think typical Indian houses, clean walls, functional spaces.
  - FOCUS ON: Clean painted walls, basic wooden or plastic furniture, typical Indian ceiling fans, stainless steel utensils, cement or tiled floors. 
  - OLD-SCHOOL FURNITURE: If the scene is indoors, include basic, functional, and old-school furniture common in regular Indian homes (e.g., Godrej-style steel almirahs, simple wooden chairs with cushions, plastic stools, a basic wooden bed with a simple bedsheet).
  - RAW & REAL: Avoid "aesthetic" or "planted" looks. NO indoor plants, NO decorative vases, NO modern art. The environment should feel functional and lived-in, not curated for social media.
- DEEP SCRIPT ANALYSIS & CONTEXTUAL VISUALS (CRITICAL):
  - THINK LIKE A DIRECTOR: Do not just visualize the literal words. Analyze the SUBTEXT, EMOTIONAL DEPTH, and SOCIAL CONTEXT of the script.
  - SCRIPT UNDERSTANDING: You MUST understand the core message, the characters' motivations, and the setting. If the script is about a midnight conversation, the visuals MUST be dark and moody. If it's about a struggle, the visuals MUST reflect that.
  - Every visual choice (lighting, camera angle, background) must serve the story being told in the script.
- SHARPNESS LEVEL 0: ALL footage MUST look natural and realistic, NOT sharp. Specify "sharpness level 0", "raw android footage", "natural focus", and "no digital sharpening" in all prompts.
- CINEMATIC LOGIC & TIME-OF-DAY SENSITIVITY: 
  - THINK LIKE A MOVIE DIRECTOR: You MUST analyze the script for any time-of-day cues (e.g., "rat k 2 baje", "midnight", "early morning", "noon").
  - LOGICAL LIGHTING: If the script implies a late-night scene (e.g., 2 AM), the house lights MUST be OFF. Do not show a bright room. Instead, use "dim moonlight filtering through a window", "harsh orange street lamp light from outside", or "the faint glow of a mobile screen". 
  - ATMOSPHERE: The lighting must reflect the logic of the scene. Noon should be harsh and bright; midnight should be dark, moody, and atmospheric.
- STYLE: If "Raw Android Shot (Amateur)" is selected, the prompt must specify handheld android mobile camera physics, natural/ambient lighting, and a spontaneous, unpolished look. Emphasize a realistic, slightly low-res, raw android photography aesthetic—avoid over-sharpening or "iPhone-like" clarity.
- VIDEO STYLES:
  - "Veo 3.1 JSON":
    - INITIAL SEGMENTS (MANDATORY):
      1. Segment 0: Master Character Moodboard. Provide high-detail portraits of ALL main characters in the story within this single segment. 
         - FORMAT: Use a grid layout (e.g., 2x2 for one character, 4x2 for two characters).
         - AESTHETIC (CRITICAL): For these character portraits, use a **flat white background** and **professional studio lighting**. This is to ensure the AI gets a perfectly clear view of the face and features for consistent recognition.
         - SHOTS: For each character, include a straight face (close-up), side face (profile), and mid shot. Keep faces BIG and CLEARLY VISIBLE.
      2. Background Moodboard: Provide 4 to 6 distinct, clear shots of the specific environments/locations required by the script.
      3. Overall Direction: This segment MUST contain the "Overall Direction" block ONLY. This is given just once to set the global style.
    - DIALOGUE TRANSLATION: The "audio_dialogue" field MUST be in Hindi script. Any English words MUST be written in Hindi pronunciation (e.g., "move on" becomes "मूव ऑन").
    - DIALOGUE LENGTH LIMIT (CRITICAL): 
        - MAXIMUM: The length of dialogue in ANY single prompt MUST NOT exceed 35 words. 
        - NO ABRUPT CUTS: If a dialogue must be split, repeat the last logical phrase in the next prompt for continuity.
    - DIALOGUE SHOTS (CRITICAL): Whenever a character is speaking dialogue, the shot MUST be a Close-Up (CU) or Medium Close-Up (MCU). Face must be clearly visible.
    - EYE CONTACT (CRITICAL): When a character speaks directly to the audience, they MUST maintain direct eye contact with the camera. 
      - CONVERSATION EXCEPTION (CRITICAL): If the character is talking to someone else, they MUST look at that person and NOT at the camera.
    - SCENE CONSOLIDATION & TIMING (CRITICAL): Include precise timeline details for each scene (e.g., "0s-3s: Character A walks in, 3s-6s: Character A speaks").
    - CONTINUITY IN ACTION: When mentioning character action after a new shot, you MUST explicitly append "wearing same cloth" to ensure visual consistency.
    - OUTPUT FORMAT (CRITICAL): The "prompt" field MUST be a stringified JSON object following the Veo 3.1 JSON Template.
    - CHARACTER DESCRIPTION (CRITICAL): Whenever you refer to a character by name, you MUST append their outfit color and "(same exact character as reference)" immediately after the name (e.g., "Rajesh in a blue shirt (same exact character as reference)"). This is especially CRITICAL in scenes with multiple characters to ensure visual distinction.

  - "Veo 3.1 JSON Storytelling":
    - Inherits ALL rules from "Veo 3.1 JSON".
    - SCRIPT DOUBLE PASS (CRITICAL): You MUST cover the entire script TWICE in the scenes array.
    - PASS 1 (UGC STYLE): The first set of scenes covers the entire script with the character speaking directly to the camera in various backgrounds (like a UGC content creator).
    - PASS 2 (CINEMATIC B-ROLL): After the UGC scenes, provide a COMPLETE start-to-end visual narrative using B-roll scenes (at least 8-10 scenes). These scenes MUST visually narrate the entire script from beginning to end without any dialogue. Characters MUST NOT speak in these scenes.

  - "Veo 3.1 JSON Conversation":
    - Inherits ALL rules from "Veo 3.1 JSON".
    - SCRIPT DOUBLE PASS (CRITICAL): Like the Storytelling style, you MUST cover the entire script TWICE in the scenes array.
    - PASS 1 (CONVERSATION STYLE): The first set of scenes covers the entire script with the back-and-forth conversation between two characters.
    - PASS 2 (CINEMATIC B-ROLL): After the conversation scenes, provide a COMPLETE start-to-end visual narrative using B-roll scenes (at least 8-10 scenes).
    - STRICT SCRIPT ADHERENCE (CRITICAL): DO NOT add any dialogues on your own. Stick ONLY to the provided script.
    - STRICT 2-CHARACTER FORMAT: Use this for back-and-forth dialogue between two characters.
    - DIALOGUE LIMIT & COMBINED SCENES: MAXIMUM of two dialogues per scene (one from Character 1, one from Character 2). Both dialogues should be included in the single prompt.
    - DIALOGUE PUNCTUATION (CRITICAL): Remove ALL punctuation and replace them exclusively with commas (,).
    - ISOLATED CLOSE-UPS (CRITICAL): Whoever is speaking MUST be the primary focus. Use ONLY Close-Up (CU) or Medium Close-Up (MCU) front/mid-face shots for the speaker.
    - NO TWO-SHOTS: Do NOT use over-the-shoulder (OTS) or wide shots showing both characters clearly while they are speaking.

  - VEO 3.1 JSON TEMPLATE (USED FOR ALL 3 STYLES):
    {
      "version": "veo-3.1",
      "output": { "duration_sec": 8, "fps": 24, "resolution": "1080p", "aspect_ratio": "9:16" },
      "global_style": { "look": "Photorealistic cinematic realism, Sharpness level 0, raw android footage", "mood": "Professional, grounded" },
      "continuity": { "characters": [{ "id": "Name", "description": "Description..." }] },
      "scenes": [
        {
          "id": "scene_01",
          "timing": "0s-3s",
          "shot": { "type": "Shot type", "camera_movement": "Movement" },
          "action": "Action details... MUST append 'wearing same cloth' and 'character speaks their dialogue in quickly withing 4 second without extra pause or slow delivery, and after completing the dialogue he just stares at screen'",
          "audio": { "dialogue": "Name: 'Hindi script'", "ambient": "Sound", "sfx": "SFX" }
        }
      ],
      "negative_prompt": "..."
    }
`;

        function App() {
            const [idea, setIdea] = useState('');
            const [imageText, setImageText] = useState('');
            const [referenceImage, setReferenceImage] = useState(null);
            const [segments, setSegments] = useState([]);
            const [editableSegments, setEditableSegments] = useState([]);
            const [editableDialogueSegments, setEditableDialogueSegments] = useState([]);
            const [editableBrollSegments, setEditableBrollSegments] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysis, setAnalysis] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [videoStyle, setVideoStyle] = useState(VIDEO_STYLES[0]);
            const [selectedModel, setSelectedModel] = useState(MODELS[0]);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [showHistory, setShowHistory] = useState(false);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('prompt_history') || '[]'));
            const [copiedIndex, setCopiedIndex] = useState(null);
            const [copiedAll, setCopiedAll] = useState(false);
            const [showKey, setShowKey] = useState(false);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            useEffect(() => {
                localStorage.setItem('prompt_history', JSON.stringify(history));
            }, [history]);

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) handleFile(file);
            };

            const handleFile = (file) => {
                const reader = new FileReader();
                reader.onload = (e) => setReferenceImage(e.target.result);
                reader.readAsDataURL(file);
            };

            const saveToHistory = (idea, text, prompt, analysis) => {
                const newItem = {
                    idea,
                    textContent: text,
                    prompt,
                    analysis,
                    timestamp: new Date().toLocaleString()
                };
                setHistory([newItem, ...history.slice(0, 19)]);
            };

            const generatePrompt = async () => {
                const hasSegments = videoStyle === "Veo 3.1 JSON" ? editableSegments.length > 0 : (editableDialogueSegments.length > 0 || editableBrollSegments.length > 0);
                if (!hasSegments) return;
                if (!apiKey) {
                    setError("Please set your Gemini API Key in settings.");
                    setShowSettings(true);
                    return;
                }
                
                setLoading(true);
                setError(null);
                setAnalysis('');
                setSegments([]);

                try {
                    const plan = videoStyle === "Veo 3.1 JSON" 
                        ? JSON.stringify(editableSegments)
                        : JSON.stringify({ dialogueSegments: editableDialogueSegments, brollSegments: editableBrollSegments });

                    const promptText = `USER SCRIPT PLAN: ${plan}\nVIDEO STYLE: ${videoStyle}${imageText ? `\nREQUIRED TEXT CONTENT: "${imageText}"` : ''}\n\nBased on the provided script segments and B-roll ideas, generate the final hyper-detailed architectural blueprints for Recraft V4.`;
                    
                    const parts = [{ text: promptText }];
                    
                    if (referenceImage) {
                        const base64Data = referenceImage.split(',')[1];
                        const mimeType = referenceImage.split(';')[0].split(':')[1];
                        parts.push({
                            inlineData: {
                                data: base64Data,
                                mimeType: mimeType
                            }
                        });
                        parts[0].text += "\n\nPRODUCT REFERENCE IMAGE PROVIDED: Please treat the attached image as the product. Do not describe the product details in the prompts, just reference it as 'use the provided product reference image' when it appears in a scene.";
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts }],
                            generationConfig: {
                                temperature: 0.9,
                                responseMimeType: "application/json",
                            },
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const resultText = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(resultText);
                    
                    setAnalysis(parsedData.analysis || '');
                    setSegments(parsedData.segments || []);
                    saveToHistory(`[${videoStyle}] ${idea}`, imageText, JSON.stringify(parsedData.segments || []), parsedData.analysis || '');
                } catch (err) {
                    console.error(err);
                    setError("Failed to synthesize prompt. Check your API key and connection.");
                } finally {
                    setLoading(false);
                }
            };

            const analyzeScript = async () => {
                if (!idea.trim()) return;
                if (!apiKey) {
                    setError("Please set your Gemini API Key in settings.");
                    setShowSettings(true);
                    return;
                }
                setLoading(true);
                setError(null);
                try {
                    let prompt = "";
                    if (videoStyle === "Veo 3.1 JSON") {
                        prompt = `You are a script analyst. Divide the following script into logical segments for a video. 
                        For each segment, provide:
                        1. The script text (MUST be in Hindi as provided).
                        2. A creative B-roll idea that visually represents that part of the script.
                        
                        Format the output as a JSON object with a "segments" array containing objects with "script" and "broll" fields.
                        
                        SCRIPT: ${idea}
                        VIDEO STYLE: ${videoStyle}`;
                    } else {
                        prompt = `You are a script analyst. Divide the following script into logical segments for a video.
                        
                        For "${videoStyle}", you MUST provide TWO separate lists:
                        1. "dialogueSegments": 
                           - For "Storytelling": A list of segments where the character speaks to the camera (UGC style).
                           - For "Conversation": A list of segments where characters talk to EACH OTHER (NOT to the camera).
                           - CRITICAL: In the "script" field, you MUST include the character's name followed by their dialogue in Hindi (e.g., "Rajesh: नमस्ते, कैसे हो?").
                        2. "brollSegments": A list of cinematic B-roll segments that visually narrate the story. These should be "small cuts" of activities or actions. Provide only a short "broll" description.
                        
                        CRITICAL: For "${videoStyle}", you MUST generate a high volume of B-roll segments (at least 10-12 segments) to ensure a rich visual narrative that covers the entire script from start to finish.
                        
                        Format the output as a JSON object with "dialogueSegments" and "brollSegments" arrays.
                        
                        SCRIPT: ${idea}
                        VIDEO STYLE: ${videoStyle}`;
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const resultText = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(resultText);
                    
                    if (videoStyle === "Veo 3.1 JSON") {
                        setEditableSegments(parsedData.segments || []);
                    } else {
                        setEditableDialogueSegments(parsedData.dialogueSegments || []);
                        setEditableBrollSegments(parsedData.brollSegments || []);
                    }
                    setIsAnalyzing(true);
                } catch (err) {
                    console.error(err);
                    setError("Failed to analyze script. Check your API key and connection.");
                } finally {
                    setLoading(false);
                }
            };

            const addEditableSegment = () => setEditableSegments([...editableSegments, { script: '', broll: '' }]);
            const addDialogueSegment = () => setEditableDialogueSegments([...editableDialogueSegments, { script: '' }]);
            const addBrollSegment = () => setEditableBrollSegments([...editableBrollSegments, { broll: '' }]);

            const updateEditableSegment = (index, field, value) => {
                const newSegments = [...editableSegments];
                newSegments[index][field] = value;
                setEditableSegments(newSegments);
            };

            const updateDialogueSegment = (index, value) => {
                const newSegments = [...editableDialogueSegments];
                newSegments[index].script = value;
                setEditableDialogueSegments(newSegments);
            };

            const updateBrollSegment = (index, value) => {
                const newSegments = [...editableBrollSegments];
                newSegments[index].broll = value;
                setEditableBrollSegments(newSegments);
            };

            const removeEditableSegment = (index) => setEditableSegments(editableSegments.filter((_, i) => i !== index));
            const removeDialogueSegment = (index) => setEditableDialogueSegments(editableDialogueSegments.filter((_, i) => i !== index));
            const removeBrollSegment = (index) => setEditableBrollSegments(editableBrollSegments.filter((_, i) => i !== index));

            const copyToClipboard = () => {
                navigator.clipboard.writeText(segments.map(s => `[${s.timestamp}] ${s.visualCue}\nPrompt: ${s.prompt}`).join('\n\n'));
                setCopiedAll(true);
                setTimeout(() => setCopiedAll(false), 2000);
            };

            const handleClear = () => {
                setIdea('');
                setImageText('');
                setReferenceImage(null);
                setSegments([]);
                setEditableSegments([]);
                setEditableDialogueSegments([]);
                setEditableBrollSegments([]);
                setIsAnalyzing(false);
                setAnalysis('');
                setError(null);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1600px] mx-auto">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                        <div className="space-y-1">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                    <Zap className="text-black w-6 h-6 fill-current" />
                                </div>
                                <h1 className="text-2xl md:text-3xl font-extrabold tracking-tighter">RECRAFT V4 <span className="text-emerald-500">ARCHITECT</span></h1>
                            </div>
                            <p className="text-muted text-xs font-mono uppercase tracking-[0.2em] opacity-50">Visual Semantics & Blueprint Synthesis</p>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowHistory(true)} className="p-3 glass rounded-xl hover:bg-white/10 transition-all group">
                                <History className="w-5 h-5 text-muted group-hover:text-white" />
                            </button>
                            <button onClick={() => setShowSettings(true)} className="p-3 glass rounded-xl hover:bg-white/10 transition-all group">
                                <Settings className="w-5 h-5 text-muted group-hover:text-white" />
                            </button>
                            <button onClick={handleClear} className="px-5 py-3 glass rounded-xl hover:bg-red-500/10 hover:text-red-400 transition-all text-sm font-bold flex items-center gap-2">
                                <Trash2 className="w-4 h-4" /> CLEAR
                            </button>
                        </div>
                    </header>

                    <main className="grid lg:grid-cols-12 gap-8">
                        <section className="lg:col-span-5 space-y-8">
                            <div className="glass rounded-2xl p-6 md:p-8 space-y-6">
                                <div className="space-y-4">
                                    <label className="label">Video Script (Hindi)</label>
                                    <textarea 
                                        className="input-field w-full min-h-[180px] resize-none custom-scrollbar text-sm leading-relaxed"
                                        placeholder="Paste your Hindi script here... e.g., 'पिछले हफ्ते अपने चंदू मजदूर ने...'"
                                        value={idea}
                                        onChange={(e) => setIdea(e.target.value)}
                                    />
                                </div>

                                <div className="space-y-4">
                                    <label className="label">Video Style</label>
                                    <div className="grid grid-cols-1 gap-2">
                                        {VIDEO_STYLES.map(style => (
                                            <button 
                                                key={style}
                                                onClick={() => setVideoStyle(style)}
                                                className={`px-4 py-3 rounded-xl text-xs font-mono transition-all text-left border ${videoStyle === style ? 'bg-emerald-500 border-emerald-500 text-black font-bold' : 'bg-white/5 border-white/5 text-muted hover:bg-white/10 hover:border-white/10'}`}
                                            >
                                                {style}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <label className="label">Product Reference Image</label>
                                    {!referenceImage ? (
                                        <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-white/10 rounded-2xl hover:border-emerald-500/50 hover:bg-emerald-500/5 transition-all cursor-pointer group">
                                            <Upload className="w-6 h-6 text-muted mb-2 group-hover:text-emerald-500" />
                                            <p className="text-[10px] font-mono text-muted uppercase tracking-widest">Click or Drag Image</p>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </label>
                                    ) : (
                                        <div className="relative w-full h-40 rounded-2xl overflow-hidden border border-white/10">
                                            <img src={referenceImage} className="w-full h-full object-cover" />
                                            <button onClick={() => setReferenceImage(null)} className="absolute top-3 right-3 p-2 bg-black/60 backdrop-blur-md rounded-full text-white hover:bg-red-500 transition-colors">
                                                <X className="w-4 h-4" />
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {!isAnalyzing ? (
                                    <button 
                                        onClick={analyzeScript}
                                        disabled={loading || !idea.trim()}
                                        className="w-full bg-white text-black font-bold py-5 rounded-xl flex items-center justify-center gap-3 hover:bg-emerald-400 transition-all disabled:opacity-50 shadow-xl shadow-white/5"
                                    >
                                        {loading ? <RefreshCw className="w-5 h-5 animate-spin" /> : <><BrainCircuit className="w-5 h-5" /> ANALYZE & PLAN SCRIPT</>}
                                    </button>
                                ) : (
                                    <div className="space-y-6">
                                        {videoStyle === "Veo 3.1 JSON" ? (
                                            <div className="space-y-4">
                                                <div className="flex items-center justify-between">
                                                    <h3 className="label mb-0">Combined Plan</h3>
                                                    <button onClick={addEditableSegment} className="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-colors"><Plus className="w-4 h-4" /></button>
                                                </div>
                                                <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                                    {editableSegments.map((seg, idx) => (
                                                        <div key={idx} className="p-4 bg-white/5 rounded-xl border border-white/10 relative group space-y-3">
                                                            <button onClick={() => removeEditableSegment(idx)} className="absolute -top-2 -right-2 p-1 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><X className="w-3 h-3" /></button>
                                                            <div>
                                                                <label className="text-[9px] font-mono text-muted uppercase block mb-1">Script</label>
                                                                <textarea className="input-field w-full text-xs min-h-[60px] p-2" value={seg.script} onChange={(e) => updateEditableSegment(idx, 'script', e.target.value)} />
                                                            </div>
                                                            <div>
                                                                <label className="text-[9px] font-mono text-muted uppercase block mb-1">B-Roll</label>
                                                                <textarea className="input-field w-full text-xs min-h-[60px] p-2 border-emerald-500/20" value={seg.broll} onChange={(e) => updateEditableSegment(idx, 'broll', e.target.value)} />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-8">
                                                <div className="space-y-4">
                                                    <div className="flex items-center justify-between">
                                                        <h3 className="label mb-0 text-emerald-400">Dialogue Segments</h3>
                                                        <button onClick={addDialogueSegment} className="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-colors"><Plus className="w-4 h-4" /></button>
                                                    </div>
                                                    <div className="space-y-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                                                        {editableDialogueSegments.map((seg, idx) => (
                                                            <div key={idx} className="p-3 bg-white/5 rounded-xl border border-white/10 relative group">
                                                                <button onClick={() => removeDialogueSegment(idx)} className="absolute -top-2 -right-2 p-1 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><X className="w-3 h-3" /></button>
                                                                <textarea className="input-field w-full text-xs min-h-[50px] p-2" value={seg.script} onChange={(e) => updateDialogueSegment(idx, e.target.value)} />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex items-center justify-between">
                                                        <h3 className="label mb-0 text-amber-400">B-Roll Segments</h3>
                                                        <button onClick={addBrollSegment} className="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-colors"><Plus className="w-4 h-4" /></button>
                                                    </div>
                                                    <div className="space-y-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                                                        {editableBrollSegments.map((seg, idx) => (
                                                            <div key={idx} className="p-3 bg-white/5 rounded-xl border border-white/10 relative group">
                                                                <button onClick={() => removeBrollSegment(idx)} className="absolute -top-2 -right-2 p-1 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><X className="w-3 h-3" /></button>
                                                                <textarea className="input-field w-full text-xs min-h-[50px] p-2 border-amber-500/20" value={seg.broll} onChange={(e) => updateBrollSegment(idx, e.target.value)} />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div className="flex gap-3 pt-4">
                                            <button onClick={() => setIsAnalyzing(false)} className="flex-1 bg-white/5 text-white font-bold py-4 rounded-xl hover:bg-white/10 transition-colors">BACK</button>
                                            <button onClick={generatePrompt} disabled={loading} className="flex-[2] bg-emerald-500 text-black font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-400 transition-all disabled:opacity-50">
                                                {loading ? <RefreshCw className="w-5 h-5 animate-spin" /> : <><Sparkles className="w-5 h-5" /> GENERATE BLUEPRINTS</>}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        <section className="lg:col-span-7 space-y-6">
                            {analysis && (
                                <div className="glass rounded-2xl p-6 border-emerald-500/20">
                                    <div className="flex items-center gap-2 mb-4">
                                        <BrainCircuit className="w-4 h-4 text-emerald-400" />
                                        <h2 className="label mb-0 text-emerald-400">Strategist Analysis</h2>
                                    </div>
                                    <p className="text-xs font-mono text-zinc-400 leading-relaxed italic">"{analysis}"</p>
                                </div>
                            )}

                            <div className="glass rounded-2xl p-6 md:p-8 flex flex-col min-h-[600px]">
                                <div className="flex items-center justify-between mb-8">
                                    <div className="flex items-center gap-3">
                                        <Terminal className="w-5 h-5 text-white" />
                                        <h2 className="label mb-0">Architectural Blueprints</h2>
                                    </div>
                                    {segments.length > 0 && (
                                        <button onClick={copyToClipboard} className={`flex items-center gap-2 text-xs transition-all px-4 py-2 rounded-xl ${copiedAll ? 'bg-emerald-500/20 text-emerald-400' : 'bg-white/5 text-muted hover:text-white hover:bg-white/10'}`}>
                                            {copiedAll ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                                            {copiedAll ? 'Copied All' : 'Copy All'}
                                        </button>
                                    )}
                                </div>

                                {loading ? (
                                    <div className="flex flex-col items-center justify-center text-center space-y-6 py-32">
                                        <div className="w-16 h-16 border-4 border-white/5 border-t-emerald-500 rounded-full animate-spin"></div>
                                        <div className="space-y-2">
                                            <p className="text-sm font-mono text-white animate-pulse">Synthesizing visual semantics...</p>
                                            <p className="text-[10px] font-mono text-muted uppercase tracking-widest">Architecting blueprints for Recraft V4</p>
                                        </div>
                                    </div>
                                ) : segments.length > 0 ? (
                                    <div className="space-y-12">
                                        {segments.map((segment, idx) => (
                                            <div key={idx} className="space-y-4 pb-8 border-b border-white/5 last:border-0 last:pb-0">
                                                <div className="flex items-start justify-between gap-4">
                                                    <div className="flex items-center gap-3">
                                                        <span className="px-3 py-1 bg-white/10 rounded-lg text-[10px] font-mono text-white">{segment.timestamp}</span>
                                                        <h3 className="text-sm font-bold text-emerald-400 tracking-tight">{segment.visualCue}</h3>
                                                    </div>
                                                    <button 
                                                        onClick={() => {
                                                            navigator.clipboard.writeText(segment.prompt);
                                                            setCopiedIndex(idx);
                                                            setTimeout(() => setCopiedIndex(null), 2000);
                                                        }}
                                                        className={`p-2 rounded-lg transition-all ${copiedIndex === idx ? 'bg-emerald-500/20 text-emerald-400' : 'bg-white/5 text-muted hover:text-white hover:bg-white/10'}`}
                                                    >
                                                        {copiedIndex === idx ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                                                    </button>
                                                </div>
                                                <p className="text-xs font-mono text-zinc-400 italic border-l-2 border-white/10 pl-4 py-1 leading-relaxed">"{segment.scriptText}"</p>
                                                <div className="p-4 bg-black/40 rounded-xl border border-white/5">
                                                    <p className="text-[11px] font-mono text-zinc-300 leading-relaxed whitespace-pre-wrap">{segment.prompt}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center text-center opacity-20 py-32">
                                        <Maximize className="w-16 h-16 mb-6" />
                                        <p className="text-sm font-mono uppercase tracking-[0.2em]">Awaiting architectural directives</p>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* Settings Modal */}
                    <AnimatePresence>
                        {showSettings && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <motion.div initial={{ scale: 0.95, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: 20 }} className="glass w-full max-w-md rounded-3xl p-8 space-y-8 relative">
                                    <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 p-2 text-muted hover:text-white transition-colors"><X className="w-6 h-6" /></button>
                                    <div className="space-y-2">
                                        <h2 className="text-xl font-bold">Settings</h2>
                                        <p className="text-xs text-muted font-mono uppercase tracking-widest">Configure your AI Engine</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="space-y-3">
                                            <label className="label">Gemini API Key</label>
                                            <div className="relative">
                                                <input 
                                                    type={showKey ? "text" : "password"}
                                                    className="input-field w-full pr-12"
                                                    placeholder="Enter your API key..."
                                                    value={apiKey}
                                                    onChange={(e) => setApiKey(e.target.value)}
                                                />
                                                <button onClick={() => setShowKey(!showKey)} className="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-white">
                                                    {showKey ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
                                                </button>
                                            </div>
                                            <p className="text-[10px] text-muted">Your key is stored locally in your browser.</p>
                                        </div>
                                        <div className="space-y-3">
                                            <label className="label">AI Model</label>
                                            <div className="grid grid-cols-1 gap-2">
                                                {MODELS.map(model => (
                                                    <button 
                                                        key={model}
                                                        onClick={() => setSelectedModel(model)}
                                                        className={`px-4 py-3 rounded-xl text-xs font-mono text-left border transition-all ${selectedModel === model ? 'bg-blue-500 border-blue-500 text-white font-bold' : 'bg-white/5 border-white/5 text-muted hover:bg-white/10'}`}
                                                    >
                                                        {model}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full bg-emerald-500 text-black font-bold py-4 rounded-xl hover:bg-emerald-400 transition-all">SAVE CONFIGURATION</button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* History Modal */}
                    <AnimatePresence>
                        {showHistory && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <motion.div initial={{ scale: 0.95, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: 20 }} className="glass w-full max-w-2xl rounded-3xl p-8 space-y-8 relative">
                                    <button onClick={() => setShowHistory(false)} className="absolute top-6 right-6 p-2 text-muted hover:text-white transition-colors"><X className="w-6 h-6" /></button>
                                    <div className="space-y-2">
                                        <h2 className="text-xl font-bold">History</h2>
                                        <p className="text-xs text-muted font-mono uppercase tracking-widest">Recent Architectural Blueprints</p>
                                    </div>
                                    <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                        {history.length > 0 ? history.map((item, idx) => (
                                            <div key={idx} className="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-[10px] font-mono text-emerald-500">{item.timestamp}</span>
                                                    <button 
                                                        onClick={() => {
                                                            setIdea(item.idea.split('] ')[1] || item.idea);
                                                            setImageText(item.textContent || '');
                                                            setSegments(JSON.parse(item.prompt));
                                                            setAnalysis(item.analysis);
                                                            setShowHistory(false);
                                                        }}
                                                        className="text-[10px] font-mono text-blue-400 hover:text-blue-300 uppercase tracking-widest"
                                                    >
                                                        Restore
                                                    </button>
                                                </div>
                                                <p className="text-xs font-bold line-clamp-2">{item.idea}</p>
                                            </div>
                                        )) : (
                                            <div className="text-center py-20 opacity-30">
                                                <Clock className="w-12 h-12 mx-auto mb-4" />
                                                <p className="text-sm font-mono uppercase tracking-widest">No history found</p>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
